<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 430" width="640" height="430" role="img" aria-label="Decision tree: am I authorized to perform this treatment?">
  <defs>
    <marker id="dt-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#6a6153"/>
    </marker>
  </defs>
  <g font-family="ui-sans-serif, system-ui, -apple-system, sans-serif">

    <!-- Start -->
    <rect x="180" y="20" width="240" height="44" rx="8" fill="#f6f1e8" stroke="#cabfa9" stroke-width="1.2"/>
    <text x="300" y="47" text-anchor="middle" font-size="12.5" fill="#221f18">Patient requests treatment</text>

    <!-- arrow start -> D1 -->
    <line x1="300" y1="64" x2="300" y2="94" stroke="#6a6153" stroke-width="1.6" marker-end="url(#dt-arrow)"/>

    <!-- Decision 1 -->
    <rect x="150" y="96" width="300" height="52" rx="8" fill="#efe7d9" stroke="#9a6a46" stroke-width="1.5"/>
    <text x="300" y="127" text-anchor="middle" font-size="12.5" font-weight="600" fill="#221f18">Valid order for THIS patient?</text>

    <!-- D1 Yes -> Proceed -->
    <line x1="450" y1="122" x2="498" y2="122" stroke="#6a6153" stroke-width="1.6" marker-end="url(#dt-arrow)"/>
    <text x="474" y="114" text-anchor="middle" font-size="10" fill="#7c5335">Yes</text>

    <!-- D1 No -> D2 -->
    <line x1="300" y1="148" x2="300" y2="180" stroke="#6a6153" stroke-width="1.6" marker-end="url(#dt-arrow)"/>
    <text x="311" y="169" font-size="10" fill="#6a6153">No</text>

    <!-- Proceed terminal -->
    <rect x="500" y="96" width="120" height="52" rx="8" fill="#efe1d0" stroke="#9a6a46" stroke-width="1.5"/>
    <text x="560" y="118" text-anchor="middle" font-size="12.5" font-weight="600" fill="#7c5335">Proceed under</text>
    <text x="560" y="134" text-anchor="middle" font-size="12.5" font-weight="600" fill="#7c5335">that authority</text>

    <!-- Decision 2 -->
    <rect x="130" y="182" width="340" height="62" rx="8" fill="#efe7d9" stroke="#9a6a46" stroke-width="1.5"/>
    <text x="300" y="209" text-anchor="middle" font-size="12.5" font-weight="600" fill="#221f18">Valid medical directive whose</text>
    <text x="300" y="226" text-anchor="middle" font-size="12.5" font-weight="600" fill="#221f18">conditions this patient meets?</text>

    <!-- D2 Yes -> Proceed (right then up) -->
    <path d="M470,213 H560 V150" fill="none" stroke="#6a6153" stroke-width="1.6" marker-end="url(#dt-arrow)"/>
    <text x="520" y="205" text-anchor="middle" font-size="10" fill="#7c5335">Yes</text>

    <!-- D2 No -> Stop -->
    <line x1="300" y1="244" x2="300" y2="284" stroke="#6a6153" stroke-width="1.6" marker-end="url(#dt-arrow)"/>
    <text x="311" y="268" font-size="10" fill="#6a6153">No</text>

    <!-- Stop terminal -->
    <rect x="170" y="286" width="260" height="58" rx="8" fill="#f3ddd3" stroke="#b0472e" stroke-width="1.6"/>
    <text x="300" y="311" text-anchor="middle" font-size="13" font-weight="700" fill="#8a3a25">Do NOT inject —</text>
    <text x="300" y="329" text-anchor="middle" font-size="13" font-weight="700" fill="#8a3a25">pause &amp; resolve first</text>

    <!-- Footer note -->
    <text x="300" y="384" text-anchor="middle" font-size="10.5" fill="#6a6153">Botulinum toxin is prescription-only: a physician or NP authorizes; the RN/RPN administers.</text>
  </g>
</svg>
