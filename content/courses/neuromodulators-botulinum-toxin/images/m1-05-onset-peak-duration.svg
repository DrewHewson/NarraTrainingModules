<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 340" width="820" height="340" role="img" aria-label="Onset, peak and duration of a neuromodulator over time">
  <defs>
    <linearGradient id="oc-fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9a6a46" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#9a6a46" stop-opacity="0.02"/>
    </linearGradient>
  </defs>
  <g font-family="ui-sans-serif, system-ui, -apple-system, sans-serif">
    <!-- baseline (no effect) -->
    <line x1="70" y1="262" x2="780" y2="262" stroke="#c9beac" stroke-width="1.5" stroke-dasharray="4 4"/>
    <text x="70" y="280" font-size="10" fill="#928979">no effect</text>
    <text x="60" y="70" font-size="10" fill="#928979" transform="rotate(-90 60 70)" text-anchor="middle">muscle relaxation →</text>

    <!-- effect curve: injection → onset → peak (~2wk) → decline → return (~3-4mo) -->
    <path d="M85,262 C130,262 140,238 165,214 C200,180 235,110 300,92 C355,88 400,92 450,110 C540,144 640,214 720,250 C745,258 765,261 775,262"
          fill="none" stroke="#9a6a46" stroke-width="2.5"/>
    <path d="M85,262 C130,262 140,238 165,214 C200,180 235,110 300,92 C355,88 400,92 450,110 C540,144 640,214 720,250 C745,258 765,261 775,262 L775,262 L85,262 Z"
          fill="url(#oc-fill)" stroke="none"/>

    <!-- markers -->
    <!-- injection -->
    <line x1="85" y1="262" x2="85" y2="300" stroke="#c9beac" stroke-width="1.2"/>
    <circle cx="85" cy="262" r="4" fill="#7c5335"/>
    <text x="85" y="315" font-size="10.5" text-anchor="middle" fill="#221f18">Injection</text>
    <text x="85" y="328" font-size="9" text-anchor="middle" fill="#928979">day 0</text>

    <!-- onset -->
    <line x1="165" y1="214" x2="165" y2="300" stroke="#c9beac" stroke-width="1.2" stroke-dasharray="3 3"/>
    <circle cx="165" cy="214" r="4" fill="#9a6a46"/>
    <text x="165" y="315" font-size="10.5" text-anchor="middle" fill="#221f18">Onset</text>
    <text x="165" y="328" font-size="9" text-anchor="middle" fill="#928979">~2&#8211;3 days &#9888;</text>

    <!-- peak -->
    <line x1="300" y1="92" x2="300" y2="300" stroke="#c9beac" stroke-width="1.2" stroke-dasharray="3 3"/>
    <circle cx="300" cy="92" r="5" fill="#9a6a46"/>
    <text x="300" y="80" font-size="11" text-anchor="middle" font-weight="600" fill="#221f18">Peak effect</text>
    <text x="300" y="315" font-size="10.5" text-anchor="middle" fill="#221f18">Peak</text>
    <text x="300" y="328" font-size="9" text-anchor="middle" fill="#928979">~2 weeks &#9888;</text>

    <!-- return -->
    <line x1="720" y1="250" x2="720" y2="300" stroke="#c9beac" stroke-width="1.2" stroke-dasharray="3 3"/>
    <circle cx="720" cy="250" r="4" fill="#9a6a46"/>
    <text x="720" y="315" font-size="10.5" text-anchor="middle" fill="#221f18">Movement returns</text>
    <text x="720" y="328" font-size="9" text-anchor="middle" fill="#928979">~3&#8211;4 months &#9888;</text>

    <text x="470" y="176" font-size="10.5" fill="#7c5335" font-style="italic">effect fades as nerve terminals recover</text>
  </g>
</svg>
